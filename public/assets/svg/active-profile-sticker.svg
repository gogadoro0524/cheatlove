<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56" role="img" aria-label="Active profile found sticker">
  <defs>
    <filter id="stickerShadow" x="-10%" y="-20%" width="120%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(8,8) rotate(-4 110 20)" filter="url(#stickerShadow)">
    <rect x="0" y="0" width="220" height="40" rx="6" fill="#F5C518" stroke="#1a1208" stroke-width="1.5"/>
    <circle cx="18" cy="20" r="6" fill="#C73E1D"/>
    <circle cx="18" cy="20" r="2.4" fill="#fff"/>
    <text x="34" y="26" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="900" letter-spacing="0.5" fill="#1a1208">ACTIVE PROFILE FOUND!</text>
  </g>
</svg>
